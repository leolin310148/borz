<!doctype html>
<html>
<head>
<meta charset="utf-8">
<style>
body { font: 13px system-ui; width: 320px; margin: 12px; }
label { display: block; margin-top: 8px; font-weight: 600; }
input { width: 100%; box-sizing: border-box; padding: 4px 6px; }
button { margin-top: 12px; padding: 6px 12px; }
.hint { color: #666; font-size: 11px; margin-top: 4px; }
.status { margin-top: 8px; font-weight: 600; }
.ok { color: #1a7f37; }
.bad { color: #cf222e; }
.caps { margin-top: 8px; color: #57606a; font-size: 11px; line-height: 1.35; }
</style>
</head>
<body>
<div><strong>borz bridge</strong></div>
<label>Host
  <input id="host" value="127.0.0.1">
</label>
<label>Port
  <input id="port" value="19824">
</label>
<label>Token
  <input id="token" type="password" placeholder="from `borz daemon status`">
</label>
<div class="hint">Run <code>borz daemon status</code> to find the token.</div>
<button id="save">Save &amp; reconnect</button>
<button id="record-start">Start recording</button>
<button id="record-stop">Stop recording</button>
<div class="status" id="status">…</div>
<div class="caps" id="caps"></div>
<script src="popup.js"></script>
</body>
</html>
