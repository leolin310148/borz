name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ['1.25']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}

      - name: Build
        run: go build -v ./...

      - name: Test
        run: go test -race -coverprofile=coverage.out -covermode=atomic ./...

      - name: Coverage summary
        run: |
          go tool cover -func=coverage.out | tail -1
          total=$(go tool cover -func=coverage.out | awk '/^total:/ {sub(/%/,"",$NF); print $NF}')
          echo "Total coverage: ${total}%"
          awk -v t="$total" 'BEGIN { if (t+0 < 80) { print "Coverage " t "% is below 80% floor"; exit 1 } }'

      - name: Upload coverage profile
        uses: actions/upload-artifact@v4
        with:
          name: coverage-profile
          path: coverage.out

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Vet
        run: go vet ./...

  release:
    needs: [build, lint]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Build binaries
        run: |
          declare -a targets=(
            "linux/amd64"
            "linux/arm64"
            "darwin/amd64"
            "darwin/arm64"
            "windows/amd64"
          )
          mkdir -p dist
          for target in "${targets[@]}"; do
            GOOS="${target%/*}"
            GOARCH="${target#*/}"
            EXT=""
            if [ "$GOOS" = "windows" ]; then EXT=".exe"; fi
            BORZ_OUTPUT="dist/borz-${GOOS}-${GOARCH}${EXT}"
            SHIM_OUTPUT="dist/bb-browser-${GOOS}-${GOARCH}${EXT}"
            echo "Building ${BORZ_OUTPUT}..."
            GOOS=$GOOS GOARCH=$GOARCH go build -ldflags "-s -w -X main.version=${GITHUB_REF_NAME#v}" -o "$BORZ_OUTPUT" .
            echo "Building ${SHIM_OUTPUT}..."
            GOOS=$GOOS GOARCH=$GOARCH go build -ldflags "-s -w" -o "$SHIM_OUTPUT" ./cmd/bb-browser-shim
          done

      - name: Bundle Chrome extension
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          # Rewrite manifest.json "version" to match the release tag so the
          # extension version stays in lockstep with the binary.
          python3 - <<EOF
          import json, pathlib
          p = pathlib.Path("extension/manifest.json")
          m = json.loads(p.read_text())
          m["version"] = "${VERSION}"
          p.write_text(json.dumps(m, indent=2) + "\n")
          EOF
          ( cd extension && zip -r "../dist/borz-extension.zip" . )

      - name: Generate checksums
        run: |
          cd dist
          sha256sum * > checksums.txt
          cat checksums.txt

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*
