  /command:
    post:
      tags: [raw]
      summary: Raw protocol escape hatch
      description: |
        Accepts a full `protocol.Request` JSON body and dispatches it. Use only
        when no `/v1/*` route fits — most clients should prefer the typed
        endpoints above.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/Request" }
      responses:
        "200":
          description: Raw response
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Response" }

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: Required when the daemon was started with a token.

  requestBodies:
    FreeformJSON:
      required: true
      content:
        application/json:
          schema:
            type: object
            additionalProperties: true

    RefOnly:
      required: true
      content:
        application/json:
          schema:
            allOf:
              - $ref: "#/components/schemas/TabTarget"
              - $ref: "#/components/schemas/WaitOptions"
              - type: object
                required: [ref]
                properties:
                  ref: { type: string, description: Element ref from a prior snapshot }

  responses:
    Ok:
      description: Successful response envelope
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Response" }
    Error:
      description: Error envelope
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Response" }

  schemas:
    TabID:
      description: Tab identifier — either a string (short ID / target ID) or an integer index.
      oneOf:
        - type: string
        - type: integer

    TabTarget:
      type: object
      description: Common tab-targeting fields accepted by most endpoints.
      properties:
        tabId: { $ref: "#/components/schemas/TabID" }
        tab:
          type: string
          description: Short-ID alias for `tabId` (string form only).

    WaitOptions:
      type: object
      description: |
        After-action wait options accepted by every endpoint that changes the
        page. Once the action runs the daemon polls
        `document.querySelector(waitFor)` on a 100 ms tick until it returns a
        non-null node or `timeoutMs` elapses (default 10000).
      properties:
        waitFor:
          type: string
          description: CSS selector to wait for after the action returns.
        timeoutMs:
          type: integer
          minimum: 0
          description: Cap for waitFor in milliseconds (default 10000).

    Since:
      description: |
        Filter events newer than this point. Accepts:
        - an integer sequence number,
        - a numeric string,
        - or the sentinel `"last_action"` meaning "since the last user action".
      oneOf:
        - type: integer
        - type: string

    Request:
      type: object
      description: Full `protocol.Request` envelope for `/command`.
      required: [action]
      properties:
        id: { type: string }
        action: { type: string }
      additionalProperties: true

    Response:
      type: object
      description: Standard response envelope.
      properties:
        id: { type: string }
        success: { type: boolean }
        error: { type: string }
        data: { type: object, additionalProperties: true }

    DoctorCheck:
      type: object
      properties:
        name: { type: string }
        status:
          type: string
          enum: [ok, warn, fail]
        detail: { type: string }

    DoctorReport:
      type: object
      properties:
        ok:
          type: boolean
          description: True when no check has status `fail`. Warnings do not flip this.
        checks:
          type: array
          items: { $ref: "#/components/schemas/DoctorCheck" }

    DaemonStatus:
      type: object
      properties:
        running: { type: boolean }
        cdpConnected: { type: boolean }
        uptime: { type: integer }
        currentSeq: { type: integer }
        currentTargetId: { type: string }
        tabs:
          type: array
          items:
            type: object
            properties:
              shortId: { type: string }
              targetId: { type: string }
              networkRequests: { type: integer }
              consoleMessages: { type: integer }
              jsErrors: { type: integer }
              lastActionSeq: { type: integer }

    TabInfo:
      type: object
      properties:
        index: { type: integer }
        url: { type: string }
        title: { type: string }
        active: { type: boolean }
        tabId: { $ref: "#/components/schemas/TabID" }
        tab: { type: string }

    RefInfo:
      type: object
      properties:
        backendDOMNodeId: { type: integer }
        xpath: { type: string }
        role: { type: string }
        name: { type: string }
        tagName: { type: string }

    ElementInfo:
      type: object
      properties:
        ref: { type: string }
        backendDOMNodeId: { type: integer }
        xpath: { type: string }
        role: { type: string }
        name: { type: string }
        tagName: { type: string }

    SnapshotData:
      type: object
      properties:
        snapshot:
          type: string
          description: Human-readable accessibility tree snapshot.
        refs:
          type: object
          additionalProperties: { $ref: "#/components/schemas/RefInfo" }
        elements:
          type: array
          items: { $ref: "#/components/schemas/ElementInfo" }

    NetworkRequestInfo:
      type: object
      properties:
        requestId: { type: string }
        url: { type: string }
        method: { type: string }
        type: { type: string }
        timestamp: { type: integer, format: int64 }
        status: { type: integer }
        statusText: { type: string }
        failed: { type: boolean }
        failureReason: { type: string }
        requestHeaders:
          type: object
          additionalProperties: { type: string }
        requestBody: { type: string }
        requestBodyTruncated: { type: boolean }
        responseHeaders:
          type: object
          additionalProperties: { type: string }
        responseBody: { type: string }
        responseBodyBase64: { type: boolean }
        responseBodyTruncated: { type: boolean }
        mimeType: { type: string }
        bodyError: { type: string }
        seq: { type: integer }

    ConsoleMessageInfo:
      type: object
      properties:
        type: { type: string }
        text: { type: string }
        timestamp: { type: integer, format: int64 }
        url: { type: string }
        lineNumber: { type: integer }
        seq: { type: integer }

    JSErrorInfo:
      type: object
      properties:
        message: { type: string }
        url: { type: string }
        lineNumber: { type: integer }
        columnNumber: { type: integer }
        stackTrace: { type: string }
        timestamp: { type: integer, format: int64 }
        seq: { type: integer }

    SiteArgDef:
      type: object
      properties:
        required: { type: boolean }
        description: { type: string }
        default: { type: string }

    SiteMeta:
      type: object
      properties:
        name: { type: string }
        description: { type: string }
        domain: { type: string }
        readOnly: { type: boolean }
        example: { type: string }
        args:
          type: object
          additionalProperties: { $ref: "#/components/schemas/SiteArgDef" }
